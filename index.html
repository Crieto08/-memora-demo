<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Fedezd fel a történetét</title>
  <style>
    :root {
      --bg: #eef1f4;
      --maxw: 1100px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); }
    body {
      min-height: 100svh;
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      justify-content: center;
      color: #16375d;
    }
    .page {
      width: min(100%, var(--maxw));
      min-height: 100svh;
      position: relative;
      overflow-x: hidden;
      background: var(--bg);
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100svh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      overflow: hidden;
      padding-top: 20px;
    }

    .bg-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      pointer-events: none;
    }
    .bg {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      object-position: top center;
      user-select: none;
      -webkit-user-drag: none;
    }

    .title {
      position: absolute;
      top: clamp(26px, 5.5vw, 54px);
      left: 50%;
      transform: translateX(-50%);
      width: min(72vw, 720px);
      z-index: 3;
      pointer-events: none;
    }
    .title img,
    .footer-strip img,
    .card img { width: 100%; height: auto; display: block; }

    .cards {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: clamp(110px, 16vh, 170px);
      width: min(90vw, 760px);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(18px, 2.2vw, 28px);
      z-index: 4;
      align-items: end;
    }

    .card {
      display: block;
      text-decoration: none;
      border-radius: 32px;
      overflow: visible;
      transition: transform .18s ease, filter .18s ease;
      outline: none;
    }
    .card:hover,
    .card:focus-visible {
      transform: translateY(-3px);
      filter: brightness(1.02);
    }

    .footer-strip {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: clamp(22px, 5.2vh, 48px);
      width: min(74vw, 650px);
      z-index: 3;
      pointer-events: none;
    }

    /* Mobil fix: két kisebb kártya maradjon egy sorban, a cím legyen kisebb és lejjebb */
    @media (max-width: 700px) {
      .hero {
        min-height: 100svh;
        padding-top: 0;
      }
      .bg {
        width: 100%;
        height: 100%;
        min-height: 100svh;
        object-fit: cover;
        object-position: center top;
      }
      .title {
        width: min(74vw, 300px);
        top: calc(env(safe-area-inset-top) + 56px);
      }
      .cards {
        width: min(88vw, 340px);
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        bottom: 118px;
      }
      .card { border-radius: 22px; }
      .footer-strip {
        width: min(88vw, 360px);
        bottom: 26px;
      }
    }

    @media (max-width: 420px) {
      .title {
        width: min(72vw, 280px);
        top: calc(env(safe-area-inset-top) + 64px);
      }
      .cards {
        width: min(86vw, 330px);
        gap: 8px;
        bottom: 112px;
      }
      .footer-strip {
        width: min(86vw, 340px);
        bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="bg-wrap"><img class="bg" src="BG.png" alt="Háttér" /></div>

      <div class="title" aria-hidden="true">
        <img src="Fedezd_fel_a_tortenetet.png" alt="Fedezd fel a történetét" />
      </div>

      <div class="cards">
        <a class="card" href="tortenet.html" aria-label="Történet megnyitása">
          <img src="Bal_gomb.png" alt="Történet" />
        </a>

        <a class="card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8" target="_blank" rel="noopener noreferrer" aria-label="Navigáció indítása">
          <img src="Jobb_gomb.png" alt="Következő állomás" />
        </a>
      </div>

      <div class="footer-strip" aria-hidden="true">
        <img src="Also_text.png" alt="2 perc olvasás, Helyszín" />
      </div>
    </section>
  </main>
</body>
</html>
