<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Memoris – Index</title>
  <style>
    :root {
      --bg: #f1f9fd;
      --navy: #163c72;
      --navy-dark: #10345e;
      --text: #16345e;
      --card: rgba(255,255,255,0.18);
      --glass-border: rgba(255,255,255,0.45);
      --shadow: 0 8px 26px rgba(27, 54, 92, 0.16);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      font-family: "Trebuchet MS", Arial, sans-serif;
      color: var(--text);
      display: flex;
      justify-content: center;
    }

    .screen {
      width: min(100vw, 375px);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) 22px calc(24px + env(safe-area-inset-bottom));
      position: relative;
      overflow-x: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 18px;
      margin-bottom: 18px;
    }

    .logo img { width: 54px; height: auto; display:block; }
    .top-actions { display: flex; gap: 10px; }

    .icon-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255,255,255,0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: var(--shadow);
      text-decoration: none;
    }

    .icon-btn img { width: 24px; height: 24px; }

    .hero {
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      min-height: 586px;
      box-shadow: var(--shadow);
      background: linear-gradient(180deg, rgba(223,238,246,0.65), rgba(241,249,253,0.88));
      border: 1px solid rgba(255,255,255,0.65);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('./Torony.png') center top / cover no-repeat;
      filter: saturate(1.02);
      z-index: 0;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(241,249,253,0.10) 0%, rgba(241,249,253,0.00) 26%, rgba(241,249,253,0.00) 48%, rgba(241,249,253,0.72) 78%, rgba(241,249,253,0.90) 100%);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 36px 14px 14px;
      min-height: 586px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-end;
    }

    .title {
      position: absolute;
      top: 40px;
      left: 28px;
      right: 28px;
      margin: 0;
      color: var(--navy-dark);
      font-size: 25px;
      line-height: 1.12;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.22);
    }

    .glass-card {
      position: relative;
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.42);
      box-shadow: 0 10px 28px rgba(18, 47, 87, 0.14), inset 0 1px 0 rgba(255,255,255,0.24);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
      margin-top: 12px;
    }

    .glass-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.26) 0%, rgba(255,255,255,0.14) 55%, rgba(255,255,255,0.20) 100%);
      z-index: 0;
      pointer-events: none;
    }

    .card-inner { position: relative; z-index: 1; }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .card-copy { flex: 1; min-width: 0; }

    .card-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--navy-dark);
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .card-label img { width: 18px; height: 18px; flex: 0 0 auto; }

    .card-text {
      color: var(--navy-dark);
      font-size: 14px;
      line-height: 1.26;
      opacity: 0.95;
    }

    .thumb {
      width: 92px;
      height: 64px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 6px 14px rgba(17, 51, 94, 0.12);
      flex: 0 0 auto;
      border: 1px solid rgba(255,255,255,0.55);
    }

    .btn {
      display: grid;
      place-items: center;
      width: 100%;
      height: 42px;
      border-radius: 11px;
      background: linear-gradient(180deg, #184987 0%, #143d74 100%);
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      border: none;
      box-shadow: 0 8px 18px rgba(18, 63, 117, 0.18);
    }

    .secondary-wrap {
      padding: 18px 0 14px;
      display: flex;
      justify-content: center;
    }

    .secondary-btn {
      min-width: 128px;
      height: 40px;
      padding: 0 20px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      text-decoration: none;
      color: var(--navy-dark);
      font-size: 16px;
      font-weight: 700;
      background: rgba(255,255,255,0.42);
      border: 1.4px solid rgba(22,60,114,0.38);
      box-shadow: 0 8px 18px rgba(27, 54, 92, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .bottom-bar {
      margin-top: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.36);
      border: 1px solid rgba(255,255,255,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      align-items: center;
      padding: 16px 18px;
      gap: 14px;
    }

    .bottom-divider {
      width: 1px;
      height: 24px;
      background: rgba(22,60,114,0.25);
      justify-self: center;
    }

    .info-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--navy-dark);
      font-size: 14px;
      white-space: nowrap;
    }

    .info-item img { width: 22px; height: 22px; }
  </style>
</head>
<body>
  <main class="screen">
    <header class="topbar">
      <a class="logo" href="index.html" aria-label="Memoris főoldal">
        <img src="./Memoris_logo.svg" alt="Memoris logo" />
      </a>
      <div class="top-actions">
        <a class="icon-btn" href="#" aria-label="Nyelv választó">
          <img src="./Web_logo.svg" alt="Nyelv" />
        </a>
        <a class="icon-btn" href="#" aria-label="Menü">
          <img src="./3line.svg" alt="Menü" />
        </a>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <h1 class="title">Fedezd fel a történetét</h1>

        <article class="glass-card">
          <div class="card-inner">
            <div class="card-head">
              <div class="card-copy">
                <div class="card-label">
                  <img src="./Book_icon.svg" alt="" />
                  <span>Történet</span>
                </div>
                <div class="card-text">Ismerd meg a hely történetét.</div>
              </div>
              <img class="thumb" src="./Torony.png" alt="Harangtorony" />
            </div>
            <a class="btn" href="tortenet.html">Megnézem</a>
          </div>
        </article>

        <article class="glass-card">
          <div class="card-inner">
            <div class="card-head">
              <div class="card-copy">
                <div class="card-label">
                  <img src="./Map_icon.svg" alt="" />
                  <span>Következő állomás</span>
                </div>
                <div class="card-text">Indulj a következő helyszínre.</div>
              </div>
              <img class="thumb" src="./Map.png" alt="Térkép" />
            </div>
            <a class="btn" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8">Indulás</a>
          </div>
        </article>
      </div>
    </section>

    <div class="secondary-wrap">
      <a class="secondary-btn" href="helyszinvalaszto.html">Helyszínek</a>
    </div>

    <section class="bottom-bar" aria-label="Információk">
      <div class="info-item">
        <img src="./Time_icon.svg" alt="" />
        <span>2 perc olvasás</span>
      </div>
      <div class="bottom-divider" aria-hidden="true"></div>
      <div class="info-item">
        <img src="./Mappoint_icon.svg" alt="" />
        <span>Helyszín</span>
      </div>
    </section>
  </main>
</body>
</html>
