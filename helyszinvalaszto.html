<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Memoris – Helyszínek</title>
  <style>
    :root {
      --bg: #f1f9fd;
      --navy: #163c72;
      --navy-dark: #10345e;
      --shadow: 0 8px 26px rgba(27, 54, 92, 0.16);
      --card-h: 118px;
      --gap: 14px;
      --list-h: 540px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      font-family: "Trebuchet MS", Arial, sans-serif;
      color: var(--navy-dark);
      display: flex;
      justify-content: center;
    }

    .screen {
      width: min(100vw, 390px);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) 22px calc(20px + env(safe-area-inset-bottom));
      position: relative;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 18px;
      margin-bottom: 18px;
    }
    .logo img { width:80px; display:block; }
    .top-actions { display:flex; gap:10px; }
    .icon-btn {
      width:44px; height:44px; display:grid; place-items:center;
      border-radius:12px; background: rgba(255,255,255,0.42);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.55); box-shadow: var(--shadow);
      text-decoration:none;
    }
    .icon-btn img { width:24px; height:24px; }

    .title {
      text-align:center;
      color: var(--navy-dark);
      font-size: 26px;
      line-height:1.1;
      font-weight:700;
      margin: 8px 0 18px;
      letter-spacing:-0.02em;
    }

    .panel {
      position: relative;
      border-radius: 22px;
      background: rgba(230,240,247,0.42);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: var(--shadow);
      padding: 14px 14px 18px;
      overflow: hidden;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }

    .list-shell {
      position: relative;
      min-height: var(--list-h);
      padding-right: 24px;
    }

    .cards-scroll {
      height: var(--list-h);
      overflow-y: auto;
      scrollbar-width: none;
      padding-right: 2px;
      scroll-behavior: smooth;
    }
    .cards-scroll::-webkit-scrollbar { width: 0; height: 0; }

    .cards-wrap {
      display: flex;
      flex-direction: column;
      gap: var(--gap);
      padding: 2px 0;
    }

    .fade-top,
    .fade-bottom {
      position: absolute;
      left: 0;
      right: 24px;
      height: 70px;
      pointer-events: none;
      z-index: 3;
    }
    .fade-top {
      top: 0;
      background: linear-gradient(180deg, rgba(241,249,253,0.98) 0%, rgba(241,249,253,0.82) 45%, rgba(241,249,253,0) 100%);
    }
    .fade-bottom {
      bottom: 0;
      background: linear-gradient(0deg, rgba(241,249,253,0.98) 0%, rgba(241,249,253,0.82) 45%, rgba(241,249,253,0) 100%);
    }

    .location-card {
      position: relative;
      height: var(--card-h);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(19, 52, 94, 0.12);
      text-decoration:none;
      color:#fff;
      border: 1px solid rgba(255,255,255,0.55);
      display:block;
      background: #dfeef6;
      transition: transform .22s ease, filter .22s ease, opacity .22s ease, box-shadow .22s ease;
      filter: grayscale(1);
      opacity: .78;
      transform: scale(.975);
    }
    .location-card::before {
      content:""; position:absolute; inset:0;
      background: url('./Torony.png') center center / cover no-repeat;
      transform: scale(1.03);
    }
    .location-card::after {
      content:""; position:absolute; inset:0;
      background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.08) 50%, rgba(16,52,94,0.1) 100%),
                  linear-gradient(180deg, rgba(16,52,94,0) 40%, rgba(16,52,94,0.4) 100%);
    }
    .location-card.active {
      filter: grayscale(0);
      opacity: 1;
      transform: scale(1);
      box-shadow: 0 12px 28px rgba(19, 52, 94, 0.18);
    }

    .card-content {
      position:relative; z-index:1; height:100%;
      display:flex; flex-direction:column; justify-content:flex-end;
      padding: 14px 16px;
    }
    .card-line {
      display:flex; align-items:flex-end; justify-content:space-between; gap:10px;
    }
    .card-title {
      font-size: 22px;
      font-weight:700;
      line-height:1;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .distance {
      display:flex; align-items:center; gap:4px;
      font-size: 11px; font-weight:700; white-space:nowrap;
      text-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    .distance img { width: 10px; height: 10px; filter: brightness(0) invert(1); }

    .scroll-rail {
      position:absolute;
      top: 10px;
      right: 2px;
      width: 18px;
      height: calc(var(--list-h) - 20px);
      z-index: 4;
      pointer-events: none;
    }
    .scroll-line {
      position:absolute; left:8px; top:0; bottom:0; width:2px; border-radius:2px;
      background: rgba(22,60,114,0.28);
    }
    .scroll-thumb {
      position:absolute; left:1px; top:0; width:16px; height:16px; border-radius:50%;
      background:#fff; border:2px solid rgba(22,60,114,0.55); box-shadow: 0 4px 12px rgba(17,51,94,0.10);
      transition: top .12s linear;
    }

    .back-row {
      display:flex; justify-content:center; padding-top: 14px;
    }
    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      text-decoration:none; color:var(--navy-dark); font-size:16px; font-weight:700;
    }
    .back-btn img { width:16px; height:16px; }

    .bottom-bar {
      margin-top: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.36);
      border: 1px solid rgba(255,255,255,0.55);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      display:flex; justify-content:center; align-items:center; gap:8px;
      padding: 16px 18px;
      color:var(--navy-dark); font-size:14px;
    }
    .bottom-bar img { width:22px; height:22px; }

    @media (max-width: 370px) {
      .screen { padding-left: 16px; padding-right: 16px; }
      .title { font-size: 24px; }
      :root { --list-h: 510px; --card-h: 112px; }
    }
  </style>
</head>
<body>
  <main class="screen">
    <header class="topbar">
      <a class="logo" href="index.html" aria-label="Memoris főoldal"><img src="./Memoris_logo.svg" alt="Memoris logo"></a>
      <div class="top-actions">
        <a class="icon-btn" href="#" aria-label="Nyelv választó"><img src="./Web_logo.svg" alt="Nyelv"></a>
        <a class="icon-btn" href="#" aria-label="Menü"><img src="./3line.svg" alt="Menü"></a>
      </div>
    </header>

    <h1 class="title">Válassz helyszínt</h1>

    <section class="panel">
      <div class="list-shell">
        <div class="fade-top"></div>
        <div class="cards-scroll" id="cardsScroll">
          <div class="cards-wrap" id="cardsWrap">
            <a class="location-card active" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Katolikus Harang</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">1.2 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Városháza</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">0.8 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Kossuth tér</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">1.1 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Református Templom</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">1.6 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Hősök emléke</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">0.9 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Piac tér</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">1.4 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Régi Iskola</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">1.3 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Kultúrház</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">2.1 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Főtéri Szobor</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">0.6 km</div></div></div></a>
            <a class="location-card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><div class="card-content"><div class="card-line"><div class="card-title">Múzeum udvar</div><div class="distance"><img src="./Mappoint_icon.svg" alt="">2.4 km</div></div></div></a>
          </div>
        </div>
        <div class="fade-bottom"></div>

        <div class="scroll-rail" aria-hidden="true">
          <div class="scroll-line"></div>
          <div class="scroll-thumb" id="scrollThumb"></div>
        </div>
      </div>

      <div class="back-row">
        <a class="back-btn" href="index.html">
          <img src="./Back_arrow_icon.svg" alt="" />
          <span>Vissza</span>
        </a>
      </div>
    </section>

    <section class="bottom-bar">
      <img src="./Mappoint_icon.svg" alt="" />
      <span>Helyszín</span>
    </section>
  </main>

  <script>
    const scrollBox = document.getElementById('cardsScroll');
    const cards = [...document.querySelectorAll('.location-card')];
    const thumb = document.getElementById('scrollThumb');
    const rail = document.querySelector('.scroll-rail');

    function updateActiveCard() {
      const scrollTop = scrollBox.scrollTop;
      let activeIndex = 0;
      let smallest = Infinity;

      cards.forEach((card, i) => {
        const cardTop = card.offsetTop - scrollTop;
        const dist = Math.abs(cardTop);
        if (dist < smallest) {
          smallest = dist;
          activeIndex = i;
        }
      });

      cards.forEach((card, i) => card.classList.toggle('active', i === activeIndex));
    }

    function updateThumb() {
      const maxScroll = scrollBox.scrollHeight - scrollBox.clientHeight;
      const railHeight = rail.clientHeight;
      const thumbHeight = thumb.clientHeight;
      const maxTop = railHeight - thumbHeight;
      const ratio = maxScroll > 0 ? scrollBox.scrollTop / maxScroll : 0;
      thumb.style.top = (ratio * maxTop) + 'px';
    }

    function refreshUI() {
      updateActiveCard();
      updateThumb();
    }

    scrollBox.addEventListener('scroll', refreshUI, { passive: true });
    window.addEventListener('load', refreshUI);
    window.addEventListener('resize', refreshUI);
  </script>
</body>
</html>
