<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helyszín választó</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f1f9fd;
    text-align: center;
    color: #222;
  }

  .page {
    min-height: 100vh;
    padding: 20px 16px 28px;
    box-sizing: border-box;
  }

  h1 {
    margin: 10px 0 20px;
    font-size: 28px;
    font-weight: 700;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    display: block;
    text-decoration: none;
    border-radius: 16px;
    overflow: hidden;
  }

  .card img {
    width: 100%;
    display: block;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
  }

  .back-wrap {
    margin-top: 22px;
  }

  .back {
    display: inline-block;
    background: #0B1C2C;
    color: #fff;
    text-decoration: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 600;
  }

  @media (min-width: 700px) {
    .grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (min-width: 1024px) {
    .grid {
      grid-template-columns: 1fr 1fr 1fr;
    }
  }
</style>
</head>
<body>
  <div class="page">
    <h1>Válassz helyszínt</h1>

    <div class="grid">
      <a class="card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><img src="Gomb_1.png" alt="Helyszín 1"></a>
      <a class="card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><img src="Gomb_2.png" alt="Helyszín 2"></a>
      <a class="card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><img src="Gomb_3.png" alt="Helyszín 3"></a>
      <a class="card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><img src="Gomb_4.png" alt="Helyszín 4"></a>
      <a class="card" href="https://maps.app.goo.gl/ie2mdJMbcxQKw8uB8"><img src="Gomb_5.png" alt="Helyszín 5"></a>
    </div>

    <div class="back-wrap">
      <a class="back" href="index.html">⬅ Vissza</a>
    </div>
  </div>
</body>
</html>
